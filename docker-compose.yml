version: '3.8'

services:
  hermes-webui-pro:
    build: .
    container_name: hermes-webui-pro
    ports:
      - "8090:8090"
    volumes:
      - /vol1/1000/docker/hermes/data:/hermes-data:ro
    environment:
      - HERMES_DATA_PATH=/hermes-data
      - JWT_SECRET=hermes-webui-pro-secret-key-2024
      - LOGIN_PASSWORD=hermes2024
    restart: unless-stopped